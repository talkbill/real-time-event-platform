apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
  namespace: real-time-platform
  labels:
    app: websocket-server
    component: websocket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
        component: websocket
    spec:
      # node user is uid 1000 by default 
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: websocket-server
        image: websocket-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: ws
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10