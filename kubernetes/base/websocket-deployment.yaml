apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
  namespace: real-time-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
    spec:
      containers:
      - name: websocket-server
        image: websocket-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: ws
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "300m", memory: "256Mi" }
