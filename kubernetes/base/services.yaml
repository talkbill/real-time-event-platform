apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: real-time-platform
  labels:
    app: api-gateway
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
spec:
  selector:
    app: api-gateway
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-server
  namespace: real-time-platform
  labels:
    app: websocket-server
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
spec:
  selector:
    app: websocket-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: ws
  type: ClusterIP
  sessionAffinity: None
