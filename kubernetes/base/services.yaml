apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: real-time-platform
spec:
  selector:
    app: api-gateway
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-server
  namespace: real-time-platform
spec:
  selector:
    app: websocket-server
  ports:
  - port: 8080
    targetPort: 8080
    name: ws
  type: ClusterIP
