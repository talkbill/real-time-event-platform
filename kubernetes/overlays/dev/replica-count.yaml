apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: real-time-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-processor
  namespace: real-time-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stream-processor
  template:
    metadata:
      labels:
        app: stream-processor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
  namespace: real-time-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server