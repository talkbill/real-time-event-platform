apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  real-time-platform-dashboard.json: |
    {
      "title": "Real-Time Platform Metrics",
      "uid": "real-time-platform",
      "panels": [
        {
          "title": "API Request Rate",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(http_requests_total[5m])",
              "legendFormat": "{{method}} {{endpoint}} {{status}}"
            }
          ]
        },
        {
          "title": "Events Produced Total",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(events_produced_total) by (event_type)"
            }
          ]
        },
        {
          "title": "Pod Status",
          "type": "stat",
          "targets": [
            {
              "expr": "count(kube_pod_status_ready{namespace='real-time-platform'} == 1)"
            }
          ]
        },
        {
          "title": "CPU Usage by Pod",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='real-time-platform'}[5m])) by (pod)"
            }
          ]
        },
        {
          "title": "Memory Usage by Pod",
          "type": "graph",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace='real-time-platform'}) by (pod)"
            }
          ]
        },
        {
          "title": "Kafka Consumer Lag",
          "type": "graph",
          "targets": [
            {
              "expr": "kafka_consumer_group_lag{namespace='kafka'}"
            }
          ]
        }
      ]
    }