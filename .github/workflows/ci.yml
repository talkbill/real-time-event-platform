name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  AWS_REGION: us-east-1
  ECR_REPO_API:       real-time-platform/api-gateway
  ECR_REPO_WEBSOCKET: real-time-platform/websocket-server
  ECR_REPO_PRODUCER:  real-time-platform/event-producer
  ECR_REPO_PROCESSOR: real-time-platform/stream-processor

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint and format check (Python)
        run: ruff check services/api-gateway/src services/event-producer/src services/stream-processor/src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint (Node.js websocket-server)
        run: |
          cd services/websocket-server
          npm ci
          npx eslint src/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "config"
          scan-ref: "."
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          trivyignores: ".trivyignore"

      - name: pip-audit
        run: |
          pip install pip-audit
          find services -name "requirements.txt" -exec pip-audit --requirement {} \;

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Test api-gateway
        run: |
          cd services/api-gateway
          pip install -r requirements.txt pytest
          pytest tests/ -v

      - name: Test event-producer
        run: |
          cd services/event-producer
          pip install -r requirements.txt pytest
          pytest tests/ -v

      - name: Test stream-processor
        run: |
          cd services/stream-processor
          pip install -r requirements.txt pytest
          pytest tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test websocket-server
        run: |
          cd services/websocket-server
          npm ci
          npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, security-scan, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push api-gateway
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_API:${{ github.sha }} services/api-gateway
          docker push $REGISTRY/$ECR_REPO_API:${{ github.sha }}

      - name: Scan api-gateway image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "image"
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_API }}:${{ github.sha }}"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          trivyignores: ".trivyignore"

      - name: Build and push event-producer
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_PRODUCER:${{ github.sha }} services/event-producer
          docker push $REGISTRY/$ECR_REPO_PRODUCER:${{ github.sha }}

      - name: Scan event-producer image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "image"
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_PRODUCER }}:${{ github.sha }}"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          trivyignores: ".trivyignore"

      - name: Build and push stream-processor
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_PROCESSOR:${{ github.sha }} services/stream-processor
          docker push $REGISTRY/$ECR_REPO_PROCESSOR:${{ github.sha }}

      - name: Scan stream-processor image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "image"
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_PROCESSOR }}:${{ github.sha }}"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          trivyignores: ".trivyignore"

      - name: Build and push websocket-server
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_WEBSOCKET:${{ github.sha }} services/websocket-server
          docker push $REGISTRY/$ECR_REPO_WEBSOCKET:${{ github.sha }}

      - name: Scan websocket-server image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "image"
          image-ref: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_WEBSOCKET }}:${{ github.sha }}"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          trivyignores: ".trivyignore"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.1"

      - name: Update Kubernetes image tags
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd kubernetes/overlays/dev
          kustomize edit set image \
            api-gateway=$REGISTRY/$ECR_REPO_API:${{ github.sha }} \
            event-producer=$REGISTRY/$ECR_REPO_PRODUCER:${{ github.sha }} \
            stream-processor=$REGISTRY/$ECR_REPO_PROCESSOR:${{ github.sha }} \
            websocket-server=$REGISTRY/$ECR_REPO_WEBSOCKET:${{ github.sha }}

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git add kubernetes/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push